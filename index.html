<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salin Teks</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .text-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.1rem;
            word-break: break-all;
            margin-bottom: 20px;
            color: #495057;
        }
        .btn-copy {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }
        .btn-copy:hover {
            background-color: #0056b3;
        }
        .btn-copy:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teks untuk Disalin:</h2>
    <div class="text-box" id="textToCopy">RGxGXrxpEpdEwYhGMtYwuwsP425z9gnYaH</div>
    <button class="btn-copy" onclick="copyText()" id="copyBtn">Salin Teks</button>
</div>

<script>
function copyText() {
    // Mengambil teks dari elemen div
    const text = document.getElementById("textToCopy").innerText;
    const btn = document.getElementById("copyBtn");
    
    // Menggunakan Clipboard API untuk menyalin teks
    navigator.clipboard.writeText(text).then(() => {
        // Mengubah teks tombol sementara sebagai feedback berhasil
        btn.innerText = "✓ Tersalin!";
        btn.style.backgroundColor = #28a745; // Hijau
        
        // Mengembalikan tombol ke desain awal setelah 2 detik
        setTimeout(() => {
            btn.innerText = "Salin Teks";
            btn.style.backgroundColor = #007bff; // Biru default
        }, 2000);
    }).catch(err => {
        console.error("Gagal menyalin teks: ", err);
        alert("Gagal menyalin teks, silakan salin secara manual.");
    });
}
</script>

</body>
</html>
